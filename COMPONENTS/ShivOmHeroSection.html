<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShivOm-Insurance Hero Section</title>

    <link rel="stylesheet" href="../CSS/ShivOmHeroSection.css">
</head>

<body>

    <!-- HERO SECTION -->
    <div class="shiv-hero-main-con">
        <div class="shiv-hero-content-con">
            <p class="shiv-hero-sub-head">One Stop Insurance Solutions</p>

            <h2 class="shiv-hero-heading">
                All types of insurance<br>under one roof
            </h2>

            <p class="shiv-hero-heading-desc">
                From life and health to vehicle and home insurance, we offer complete
                protection for every aspect of your life. Our expert advisors help you choose
                the right coverage with transparent pricing and hassle-free claims process.
            </p>

            <div class="shiv-hero-content-buttons-con">
                <button class="shiv-hero-need-help-btn">Talk to Expert</button>
                <button class="shiv-hero-services-btn">Insurance Plans</button>
            </div>
        </div>

        <div class="shiv-hero-image-main-con">
            <div class="shiv-hero-img-con">
                <img src="../IMAGES/shivOmHeroImage.jpg" alt="insurance hero image">
            </div>
        </div>
    </div>

    <div class="shiv-hero-swiper-main-con">
        <div class="shiv-hero-swiper-inner-con">
            <div class="shiv-marquee-track">

                <!-- ORIGINAL IMAGES -->
                <div class="hero-swiper-img-con"><img src="../IMAGES/is1.jpg"></div>
                <div class="hero-swiper-img-con"><img src="../IMAGES/is2.jpg"></div>
                <div class="hero-swiper-img-con"><img src="../IMAGES/is3.jpg"></div>
                <div class="hero-swiper-img-con"><img src="../IMAGES/is4.jpg"></div>
                <div class="hero-swiper-img-con"><img src="../IMAGES/is5.jpg"></div>
                <div class="hero-swiper-img-con"><img src="../IMAGES/is6.jpg"></div>
                <div class="hero-swiper-img-con"><img src="../IMAGES/is7.jpg"></div>
                <div class="hero-swiper-img-con"><img src="../IMAGES/is8.jpg"></div>
                <div class="hero-swiper-img-con"><img src="../IMAGES/is9.jpg"></div>
                <div class="hero-swiper-img-con"><img src="../IMAGES/is10.jpg"></div>

                <!-- DUPLICATE FOR INFINITE LOOP -->
                <div class="hero-swiper-img-con"><img src="../IMAGES/is1.jpg"></div>
                <div class="hero-swiper-img-con"><img src="../IMAGES/is2.jpg"></div>
                <div class="hero-swiper-img-con"><img src="../IMAGES/is3.jpg"></div>
                <div class="hero-swiper-img-con"><img src="../IMAGES/is4.jpg"></div>
                <div class="hero-swiper-img-con"><img src="../IMAGES/is5.jpg"></div>
                <div class="hero-swiper-img-con"><img src="../IMAGES/is6.jpg"></div>
                <div class="hero-swiper-img-con"><img src="../IMAGES/is7.jpg"></div>
                <div class="hero-swiper-img-con"><img src="../IMAGES/is8.jpg"></div>
                <div class="hero-swiper-img-con"><img src="../IMAGES/is9.jpg"></div>
                <div class="hero-swiper-img-con"><img src="../IMAGES/is10.jpg"></div>

            </div>
        </div>
    </div>

</body>
</html>
